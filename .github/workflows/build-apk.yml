name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install kivy numpy

    - name: Download and setup Buildozer
      run: |
        # Download buildozer
        pip install buildozer cython

        # Install Android SDK and NDK prerequisites
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk

        # Install Python build dependencies
        sudo apt-get install -y \
            python3-dev \
            libffi-dev \
            libssl-dev \
            build-essential \
            git \
            zip \
            unzip \
            wget \
            curl \
            liblzma-dev \
            libxml2-dev \
            libxml2 \
            libxslt1-dev \
            libxslt1 \
            libjpeg-dev \
            zlib1g-dev \
            libtiff-dev \
            libpng-dev \
            libfreetype6-dev \
            liblcms2-dev \
            libwebp-dev \
            libharfbuzz-dev \
            libfribidi-dev

    - name: Build APK
      run: |
        cd /home/runner/work/yuv-converter-android/yuv-converter-android
        buildozer android debug 2>&1 | tee build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: yuv-converter-apk
        path: bin/*.apk
        retention-days: 30

    - name: Check build status
      if: always()
      run: |
        if [ -f build.log ]; then
          echo "=== Build Log ==="
          tail -100 build.log
        fi