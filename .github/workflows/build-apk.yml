name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Install Android dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk

    - name: Build APK
      run: |
        cd /home/runner/work/yuv-converter-android/yuv-converter-android
        buildozer android debug --no-logs

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: yuv-converter-apk
        path: bin/*.apk
        retention-days: 30